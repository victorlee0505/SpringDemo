openapi: 3.0.3
info:
  description: "Movie Related APIs."
  version: "1.0.0"
  title: "MOVIE API"
  contact:
    name: "MTO"
servers:
  - url: 'http://localhost:8080/movie/'
tags:
  - name: "Published Content"
    description: "Published Content APIs"
paths:
  /movie/all:
    get:
      operationId: all
      summary: get all movies
      description: same as summary
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '400':
          description: Bad response
          content:
            application/json:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal Server Error
          content: { }
  /movie/find/{id}:
    get:
      operationId: find
      summary: find a movie by id
      description: same as summary
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
            description: IVM ID
            example: 923545d2f39f797bac4db65c646f5a10
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '400':
          description: Bad response
          content:
            application/json:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal Server Error
          content: { }
  /movie/add:
    post:
      operationId: add
      summary: add a movie
      description: just run
      requestBody:
        description: movie's detail
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Movie'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '400':
          description: Bad response
          content:
            application/json:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Internal Server Error
          content: { }
components:
  schemas:
    Movie:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        release:
          type: int
        rating:
          type: int
        # Add other movie properties as needed...
    MovieResponse:
      type: object
      properties:
        movie:
          $ref: '#/components/schemas/Movie'
        movies:
          type: array
          items:
            $ref: '#/components/schemas/Movie'
        response:
          $ref: '#/components/schemas/response'
        # reason:
        #   $ref: '#/components/schemas/errorReason'
    response:
      type: string
      enum:
        - 'NO'
        - 'YES'
  responses:
    UnauthorizedError:
      description: Access token is missing or invalid